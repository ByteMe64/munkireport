---
# =============================================================================
# MunkiReport Docker Compose - Portainer Ready (No bind mounts)
# =============================================================================
#
# Stack:
#   traefik-init      — writes Traefik dynamic config into a named volume
#   traefik           — reverse proxy, TLS termination, Let's Encrypt
#   munkireport-init  — writes admin user YAML into a named volume
#   db                — MariaDB 11.4 LTS
#   munkireport       — MunkiReport v5.8.0, built from Dockerfile
#                       Ubuntu 24.04 LTS + PHP 8.5 + Apache 2.4
#
# NOTE ON TRAEFIK / DOCKER SOCKET:
# traefik-init writes the routing config into a named volume at deploy time. No Docker socket access is required.
#
# =============================================================================

version: "3.8"

services:

  # ---------------------------------------------------------------------------
  # Traefik init — writes the dynamic routing config into a named volume.
  # Runs once at deploy time so Traefik doesn't need Docker socket access.
  # ---------------------------------------------------------------------------
  traefik-init:
    image: busybox:${BUSYBOX_VERSION:-latest}
    container_name: traefik-init
    restart: "no"
    environment:
      DOMAIN: "${DOMAIN}"
    volumes:
      - traefik-config:/etc/traefik/conf.d
    command:
      - sh
      - -c
      - |
        cat > /etc/traefik/conf.d/munkireport.yml << EOF
        http:
          routers:
            munkireport:
              rule: "Host(\`${DOMAIN}\`)"
              entryPoints:
                - websecure
              tls:
                certResolver: letsencrypt
              service: munkireport
          services:
            munkireport:
              loadBalancer:
                servers:
                  - url: "http://munkireport:80"
        EOF
        echo "--- traefik config written ---"
        cat /etc/traefik/conf.d/munkireport.yml

  # ---------------------------------------------------------------------------
  # Traefik — reverse proxy, handles HTTPS and Let's Encrypt certificates.
  # Uses a file provider — no Docker socket required.
  # HTTP (port 80) is accepted only to complete the ACME challenge and is then
  # redirected to HTTPS. All normal traffic uses port 443.
  # ---------------------------------------------------------------------------
  traefik:
    image: traefik:v3.3
    container_name: traefik
    restart: unless-stopped
    depends_on:
      traefik-init:
        condition: service_completed_successfully
    command:
      - "--providers.file.directory=/etc/traefik/conf.d"
      - "--providers.file.watch=false"
      - "--entrypoints.web.address=:80"
      - "--entrypoints.websecure.address=:443"
      - "--entrypoints.web.http.redirections.entrypoint.to=websecure"
      - "--entrypoints.web.http.redirections.entrypoint.scheme=https"
      - "--certificatesresolvers.letsencrypt.acme.httpchallenge=true"
      - "--certificatesresolvers.letsencrypt.acme.httpchallenge.entrypoint=web"
      - "--certificatesresolvers.letsencrypt.acme.email=${ACME_EMAIL}"
      - "--certificatesresolvers.letsencrypt.acme.storage=/letsencrypt/acme.json"
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - traefik-certs:/letsencrypt
      - traefik-config:/etc/traefik/conf.d:ro
    networks:
      - munkireport-net

  # ---------------------------------------------------------------------------
  # Init container — writes admin.yml into the named volume.
  #
  # PASSWORD HASH ESCAPING NOTES (for future reference):
  #   Inside a double-quoted printf string, only these characters need escaping:
  #     $  → \044  (prevents shell variable expansion)
  #     \  → \\    (literal backslash — does not appear in bcrypt/phpass hashes)
  #     `  → \`    (prevents command substitution — does not appear in hashes)
  #
  #   bcrypt ($2y$...) and phpass ($P$...) hashes only use [A-Za-z0-9./] plus $,
  #   so in practice only $ needs escaping → replace every $ with \044.
  #
  #   Example — bcrypt hash:  $2y$10$abc...xyz
  #   Encoded in printf:      \0442y\04410\044abc...xyz
  #
  #   Example — phpass hash:  $P$BVRRqgBtBOrmY9uhku19E4AA.Mg2ZF0
  #   Encoded in printf:      \044P\044BVRRqgBtBOrmY9uhku19E4AA.Mg2ZF0
  # ---------------------------------------------------------------------------
  munkireport-init:
    image: busybox:${BUSYBOX_VERSION:-latest}
    container_name: munkireport-init
    restart: "no"
    volumes:
      - munkireport-users:/users
    command:
      - sh
      - -c
      - |
        mkdir -p /users
        printf 'username: admin\n'                                                > /users/admin.yml
        printf 'realname: Administrator\n'                                       >> /users/admin.yml
        printf "password_hash: '\0442y\04410\044NeXj2vRALSHtnXRaF.3HCeb65ajbdjafRSy6BK/lfJph4LvzRe5xS'\n"    >> /users/admin.yml
        printf 'email: admin@example.com\n'                                      >> /users/admin.yml
        echo "--- admin.yml written ---"
        cat /users/admin.yml

  # ---------------------------------------------------------------------------
  # MariaDB 11.4 LTS
  # ---------------------------------------------------------------------------
  db:
    image: mariadb:${MARIADB_VERSION:-11.4}
    container_name: munkireport-db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: "${MYSQL_ROOT_PASSWORD}"
      MYSQL_DATABASE: "${MYSQL_DATABASE}"
      MYSQL_USER: "${MYSQL_USER}"
      MYSQL_PASSWORD: "${MYSQL_PASSWORD}"
    volumes:
      - munkireport-db:/var/lib/mysql
    networks:
      - munkireport-net
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ---------------------------------------------------------------------------
  # MunkiReport — built from Dockerfile in this repo
  # Ubuntu 24.04 LTS + PHP 8.3 + Apache 2.4 + MunkiReport v5.8.0
  # Note: no 'image:' tag here — this is build-only, not pulled from a registry
  # ---------------------------------------------------------------------------
  munkireport:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        MUNKIREPORT_VERSION: "5.8.0"
    container_name: munkireport
    restart: unless-stopped
    depends_on:
      munkireport-init:
        condition: service_completed_successfully
      db:
        condition: service_healthy
    environment:
      SITENAME: "${SITENAME:-MunkiReport}"
      WEBHOST: "https://${DOMAIN}"
      PASSPHRASE: "${CLIENT_PASSPHRASE}"

      CONNECTION_DRIVER: "mysql"
      CONNECTION_HOST: "db"
      CONNECTION_PORT: "3306"
      CONNECTION_DATABASE: "${MYSQL_DATABASE}"
      CONNECTION_USERNAME: "${MYSQL_USER}"
      CONNECTION_PASSWORD: "${MYSQL_PASSWORD}"
      CONNECTION_CHARSET: "utf8mb4"
      CONNECTION_COLLATION: "utf8mb4_unicode_ci"

      AUTH_METHODS: "LOCAL"
      ROLES_ADMIN: "admin"
      ALLOW_MIGRATIONS: "TRUE"

      MODULES: >-
        disk_report,managedinstalls,munkireport,munkireportinfo,
        applications,inventory,network,security,filevault_status,
        softwareupdate,displays_info,installhistory,user_sessions,
        mdm_status,power,wifi

    volumes:
      - munkireport-users:/var/munkireport/local/users
      - munkireport-data:/var/munkireport/local
    networks:
      - munkireport-net

# =============================================================================
# Volumes — all Docker-managed, nothing required on the host filesystem
# =============================================================================
volumes:
  munkireport-db:
  munkireport-users:
  munkireport-data:
  traefik-certs:
  traefik-config:

# =============================================================================
# Networks
# =============================================================================
networks:
  munkireport-net:
    driver: bridge
