---
# =============================================================================
# MunkiReport Docker Compose - Portainer Ready (No bind mounts)
# =============================================================================
#
# Stack:
#   munkireport-init  — writes admin user YAML into a named volume
#   db                — MariaDB 11.4 LTS
#   munkireport       — MunkiReport v5.8.0, built from Dockerfile
#                       Ubuntu 24.04 LTS + PHP 8.3 + Apache 2.4
#
# BEFORE DEPLOYING:
#   1. Set MYSQL_ROOT_PASSWORD and MYSQL_PASSWORD to strong values
#      (CONNECTION_PASSWORD must match MYSQL_PASSWORD exactly)
#   2. Default admin login: username=admin  password=admin
#
# PORTAINER DEPLOYMENT:
#   Use Stacks → Add stack → Repository, pointing at the repo containing
#   both this file and the Dockerfile. Portainer will build the image
#   automatically before starting the stack.
#
# =============================================================================

version: "3.8"

services:

  # ---------------------------------------------------------------------------
  # Init container — writes admin.yml into the named volume.
  # Dollar signs written as octal \044 to prevent shell expansion.
  # Hash below is phpass for password: admin
  # ---------------------------------------------------------------------------
  munkireport-init:
    image: busybox:latest
    container_name: munkireport-init
    restart: "no"
    volumes:
      - munkireport-users:/users
    command:
      - sh
      - -c
      - |
        mkdir -p /users
        printf 'username: admin\n'                                                > /users/admin.yml
        printf 'realname: Administrator\n'                                       >> /users/admin.yml
        printf "password_hash: '\044P\044BVRRqgBtBOrmY9uhku19E4AA.Mg2ZF0'\n"    >> /users/admin.yml
        printf 'email: admin@example.com\n'                                      >> /users/admin.yml
        echo "--- admin.yml written ---"
        cat /users/admin.yml

  # ---------------------------------------------------------------------------
  # MariaDB 11.4 LTS
  # ---------------------------------------------------------------------------
  db:
    image: mariadb:11.4
    container_name: munkireport-db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: "CHANGE_ME_ROOT_PASSWORD"
      MYSQL_DATABASE: "munkireport"
      MYSQL_USER: "munkireport"
      MYSQL_PASSWORD: "CHANGE_ME_DB_PASSWORD"
    volumes:
      - munkireport-db:/var/lib/mysql
    networks:
      - munkireport-net
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ---------------------------------------------------------------------------
  # MunkiReport — built from Dockerfile in this repo
  # Ubuntu 24.04 LTS + PHP 8.3 + Apache 2.4 + MunkiReport v5.8.0
  # Note: no 'image:' tag here — this is build-only, not pulled from a registry
  # ---------------------------------------------------------------------------
  munkireport:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: munkireport
    restart: unless-stopped
    depends_on:
      munkireport-init:
        condition: service_completed_successfully
      db:
        condition: service_healthy
    ports:
      - "8080:80"
    environment:
      SITENAME: "MunkiReport"
      WEBHOST: "http://127.0.0.1:8080"

      CONNECTION_DRIVER: "mysql"
      CONNECTION_HOST: "db"
      CONNECTION_PORT: "3306"
      CONNECTION_DATABASE: "munkireport"
      CONNECTION_USERNAME: "munkireport"
      CONNECTION_PASSWORD: "CHANGE_ME_DB_PASSWORD"
      CONNECTION_CHARSET: "utf8mb4"
      CONNECTION_COLLATION: "utf8mb4_unicode_ci"

      AUTH_METHODS: "LOCAL"
      ROLES_ADMIN: "admin"
      ALLOW_MIGRATIONS: "TRUE"

      MODULES: >-
        disk_report,managedinstalls,munkireport,munkireportinfo,
        applications,inventory,network,security,filevault_status,
        softwareupdate,displays_info,installhistory,user_sessions,
        mdm_status,power,wifi

    volumes:
      - munkireport-users:/var/munkireport/local/users
      - munkireport-data:/var/munkireport/local
    networks:
      - munkireport-net

# =============================================================================
# Volumes — all Docker-managed, nothing required on the host filesystem
# =============================================================================
volumes:
  munkireport-db:
  munkireport-users:
  munkireport-data:

# =============================================================================
# Networks
# =============================================================================
networks:
  munkireport-net:
    driver: bridge