# =============================================================================
# MunkiReport Docker Compose - Portainer Ready
# =============================================================================
#
# Stack:
#   munkireport-init  — writes admin user YAML into a named volume
#   db                — MariaDB (version from .env)
#   munkireport       — MunkiReport (version from .env), built from Dockerfile
#
# UPGRADING ANY COMPONENT:
#   1. Update the relevant *_VERSION variable in .env
#   2. Portainer: Update Stack (check "Re-pull image" for db, "Rebuild" for munkireport)
#
# CHANGING THE ADMIN PASSWORD:
#   1. Generate a new phpass hash (see .env for instructions)
#   2. Update ADMIN_PASSWORD_HASH in .env
#   3. Run: docker compose down && docker volume rm munkireport-users && docker compose up -d
#
# =============================================================================

services:

  # ---------------------------------------------------------------------------
  # Init container — writes admin.yml into the named volume.
  # Uses the same octal-escaped dollar signs as the original that worked,
  # with the hash value substituted from .env at runtime.
  # ---------------------------------------------------------------------------
  munkireport-init:
    image: busybox:${BUSYBOX_VERSION:-1.37}
    container_name: munkireport-init
    restart: "no"
    volumes:
      - munkireport-users:/users
    environment:
      ADMIN_EMAIL: "${ADMIN_EMAIL:-admin@example.com}"
      ADMIN_REALNAME: "${ADMIN_REALNAME:-Administrator}"
      ADMIN_PASSWORD_HASH: "${ADMIN_PASSWORD_HASH}"
    command:
      - sh
      - -c
      - |
        mkdir -p /users
        printf 'username: admin\n'                                > /users/admin.yml
        printf 'realname: %s\n' "$ADMIN_REALNAME"               >> /users/admin.yml
        printf 'password_hash: '"'"'%s'"'"'\n' "$ADMIN_PASSWORD_HASH" >> /users/admin.yml
        printf 'email: %s\n' "$ADMIN_EMAIL"                     >> /users/admin.yml
        echo "--- admin.yml written ---"
        cat /users/admin.yml

  # ---------------------------------------------------------------------------
  # MariaDB
  # ---------------------------------------------------------------------------
  db:
    image: mariadb:${MARIADB_VERSION:-11.4}
    container_name: munkireport-db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: "${MYSQL_ROOT_PASSWORD}"
      MYSQL_DATABASE: "${MYSQL_DATABASE:-munkireport}"
      MYSQL_USER: "${MYSQL_USER:-munkireport}"
      MYSQL_PASSWORD: "${MYSQL_PASSWORD}"
    command: >
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_unicode_ci
    volumes:
      - munkireport-db:/var/lib/mysql
    networks:
      - munkireport-net
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1.0"
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ---------------------------------------------------------------------------
  # MunkiReport
  # ---------------------------------------------------------------------------
  munkireport:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        PHP_VERSION: "${PHP_VERSION:-8.3}"
        MUNKIREPORT_VERSION: "${MUNKIREPORT_VERSION:-5.8.0}"
    container_name: munkireport
    restart: unless-stopped
    depends_on:
      munkireport-init:
        condition: service_completed_successfully
      db:
        condition: service_healthy
    ports:
      - "${HOST_PORT:-127.0.0.1:8080}:80"
    environment:
      SITENAME: "${SITENAME:-MunkiReport}"
      WEBHOST: "${WEBHOST}"

      CONNECTION_DRIVER: "mysql"
      CONNECTION_HOST: "db"
      CONNECTION_PORT: "3306"
      CONNECTION_DATABASE: "${MYSQL_DATABASE:-munkireport}"
      CONNECTION_USERNAME: "${MYSQL_USER:-munkireport}"
      CONNECTION_PASSWORD: "${MYSQL_PASSWORD}"
      CONNECTION_CHARSET: "utf8mb4"
      CONNECTION_COLLATION: "utf8mb4_unicode_ci"

      AUTH_METHODS: "LOCAL"
      ROLES_ADMIN: "admin"
      ALLOW_MIGRATIONS: "${ALLOW_MIGRATIONS:-TRUE}"

      MODULES: "${MUNKIREPORT_MODULES}"

    volumes:
      - munkireport-users:/var/munkireport/local/users
      - munkireport-data:/var/munkireport/local
    networks:
      - munkireport-net
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1.0"

# =============================================================================
# Volumes
# =============================================================================
volumes:
  munkireport-db:
  munkireport-users:
  munkireport-data:

# =============================================================================
# Networks
# =============================================================================
networks:
  munkireport-net:
    driver: bridge
