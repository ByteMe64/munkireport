services:
  db:
    image: mariadb:latest
    container_name: munkireport_db
    networks:
      - db_net
    environment:
      MARIADB_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-SuperSecretRoot123!}
      MARIADB_DATABASE: munkireport
      MARIADB_USER: munkiuser
      MARIADB_PASSWORD: ${DB_PASSWORD:-MunkiSecretPass123!}
    volumes:
      - db_data:/var/lib/mysql
    restart: unless-stopped

  munkireport:
    build: .
    container_name: munkireport_app
    networks:
      - db_net
      - external_net
    ports:
      - "8443:443"
    environment:
      DB_HOST: db
      DB_NAME: munkireport
      DB_USER: munkiuser
      DB_PASSWORD: ${DB_PASSWORD:-MunkiSecretPass123!}
      MR_HOST: localhost
    depends_on:
      - db
    restart: unless-stopped

networks:
  db_net:
    internal: true # Totally isolated from the outside world
  external_net:

volumes:
  db_data:
