# =============================================================================
# MunkiReport Docker Compose - Portainer Ready
# =============================================================================
#
# Stack:
#   munkireport-init  — busybox init container, writes admin user YAML
#   db                — MariaDB 11.4 LTS (latest LTS as of 2025)
#   munkireport       — MunkiReport v5.8.0 built from Dockerfile
#                       Ubuntu 24.04 LTS + PHP 8.3 + Apache 2.4
#
# BEFORE DEPLOYING:
#   1. Set MYSQL_ROOT_PASSWORD and MYSQL_PASSWORD to strong values
#      (CONNECTION_PASSWORD must match MYSQL_PASSWORD)
#   2. Set WEBHOST to your server IP/hostname e.g. http://192.168.1.100:8080
#   3. Default admin login is admin / admin
#
# PORTAINER DEPLOYMENT:
#   In Portainer → Stacks → Add stack → Upload → select this file AND
#   the Dockerfile from the same folder, then deploy.
#   Alternatively use "Repository" mode pointing at a git repo containing
#   both files.
#
# NOTE ON PHP VERSION:
#   MunkiReport v5.8.0 was tested against PHP 8.2. PHP 8.3 is the next
#   supported version (8.4 is confirmed broken by the MunkiReport team).
#   PHP 8.1 reached end-of-life December 31 2025 so 8.3 is the best
#   currently maintained option.
#
# =============================================================================

version: "3.8"

services:

  # ---------------------------------------------------------------------------
  # Init container — writes admin.yml into the named volume.
  # Dollar signs written as octal \044 to prevent shell expansion.
  # Hash below is phpass for password: admin
  # ---------------------------------------------------------------------------
  munkireport-init:
    image: busybox:latest
    container_name: munkireport-init
    restart: "no"
    volumes:
      - munkireport-users:/users
    command:
      - sh
      - -c
      - |
        mkdir -p /users
        printf 'username: admin\n'                                                  > /users/admin.yml
        printf 'realname: Administrator\n'                                         >> /users/admin.yml
        printf "password_hash: '\044P\044BVRRqgBtBOrmY9uhku19E4AA.Mg2ZF0'\n"      >> /users/admin.yml
        printf 'email: admin@example.com\n'                                        >> /users/admin.yml
        echo "--- admin.yml written ---"
        cat /users/admin.yml

  # ---------------------------------------------------------------------------
  # MariaDB 11.4 LTS — database backend
  # ---------------------------------------------------------------------------
  db:
    image: mariadb:11.4
    container_name: munkireport-db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: "CHANGE_ME_ROOT_PASSWORD"
      MYSQL_DATABASE: "munkireport"
      MYSQL_USER: "munkireport"
      MYSQL_PASSWORD: "CHANGE_ME_DB_PASSWORD"
    volumes:
      - munkireport-db:/var/lib/mysql
    networks:
      - munkireport-net
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ---------------------------------------------------------------------------
  # MunkiReport — built from local Dockerfile
  # Ubuntu 24.04 LTS + PHP 8.3 + Apache 2.4 + MunkiReport v5.8.0
  # ---------------------------------------------------------------------------
  munkireport:
    build:
      context: .
      dockerfile: Dockerfile
    image: munkireport-custom:5.8.0-php8.3-ubuntu2404
    container_name: munkireport
    restart: unless-stopped
    depends_on:
      munkireport-init:
        condition: service_completed_successfully
      db:
        condition: service_healthy
    ports:
      - "8080:80"                            # Change host port if needed
    environment:
      # -- Site ------------------------------------------------------------------
      SITENAME: "MunkiReport"
      WEBHOST: "http://127.0.0.1:8080" # <-- Update this

      # -- Database --------------------------------------------------------------
      CONNECTION_DRIVER: "mysql"
      CONNECTION_HOST: "db"
      CONNECTION_PORT: "3306"
      CONNECTION_DATABASE: "munkireport"
      CONNECTION_USERNAME: "munkireport"
      CONNECTION_PASSWORD: "CHANGE_ME_DB_PASSWORD"  # Must match MYSQL_PASSWORD
      CONNECTION_CHARSET: "utf8mb4"
      CONNECTION_COLLATION: "utf8mb4_unicode_ci"

      # -- Auth ------------------------------------------------------------------
      AUTH_METHODS: "LOCAL"
      ROLES_ADMIN: "admin"

      # -- Migrations ------------------------------------------------------------
      ALLOW_MIGRATIONS: "TRUE"

      # -- Modules ---------------------------------------------------------------
      MODULES: >-
        disk_report,managedinstalls,munkireport,munkireportinfo,
        applications,inventory,network,security,filevault_status,
        softwareupdate,displays_info,installhistory,user_sessions,
        mdm_status,power,wifi

    volumes:
      # Users volume pre-populated by the init container
      - munkireport-users:/var/munkireport/local/users
      # Persistent local data (dashboards, env config, etc.)
      - munkireport-data:/var/munkireport/local
    networks:
      - munkireport-net

# =============================================================================
# Volumes — all Docker-managed, nothing required on the host filesystem
# =============================================================================
volumes:
  munkireport-db:
  munkireport-users:
  munkireport-data:

# =============================================================================
# Networks
# =============================================================================
networks:
  munkireport-net:
    driver: bridge