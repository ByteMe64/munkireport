# =============================================================================
# BEFORE DEPLOYING:
#   1. Set MYSQL_ROOT_PASSWORD, MYSQL_PASSWORD & Admin to strong values
#   2. Set WEBHOST to your server IP/hostname e.g. http://192.168.1.100:8080
#
# TO CHANGE THE ADMIN PASSWORD after deployment:
#   Exec into the container and run:
#     php -r "require '/var/munkireport/vendor/autoload.php'; \$h = new Hautelook\Phpass\PasswordHash(8, true); echo \$h->HashPassword('newpassword') . PHP_EOL;"
#   Then update /var/munkireport/local/users/admin.yml with the new hash.
#
# =============================================================================

version: "3.8"

services:
  munkireport-init:
    image: busybox:latest
    container_name: munkireport-init
    restart: "no"
    volumes:
      - munkireport-users:/users
    command:
      - sh
      - -c
      - |
        mkdir -p /users
        printf 'username: admin\n'                                    > /users/admin.yml
        printf 'realname: Administrator\n'                           >> /users/admin.yml
        printf "password_hash: '\044P\044BVRRqgBtBOrmY9uhku19E4AA.Mg2ZF0'\n" >> /users/admin.yml
        printf 'email: admin@example.com\n'                          >> /users/admin.yml
        echo "--- admin.yml written ---"
        cat /users/admin.yml

  # ---------------------------------------------------------------------------
  # MariaDB
  # ---------------------------------------------------------------------------
  db:
    image: mariadb:10.11
    container_name: munkireport-db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: "CHANGE_ME_ROOT_PASSWORD"  # <-- Set
      MYSQL_DATABASE: "munkireport"
      MYSQL_USER: "munkireport"
      MYSQL_PASSWORD: "CHANGE_ME_DB_PASSWORD"   # <-- Set
    volumes:
      - munkireport-db:/var/lib/mysql
    networks:
      - munkireport-net
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ---------------------------------------------------------------------------
  # MunkiReport PHP
  # ---------------------------------------------------------------------------
  munkireport:
    image: ghcr.io/munkireport/munkireport-php:v5.8.0
    container_name: munkireport
    restart: unless-stopped
    depends_on:
      munkireport-init:
        condition: service_completed_successfully
      db:
        condition: service_healthy
    ports:
      - "8080:80"
    environment:
      SITENAME: "MunkiReport"
      WEBHOST: "http://127.0.0.1:8080"   # <-- Set host IP

      CONNECTION_DRIVER: "mysql"
      CONNECTION_HOST: "db"
      CONNECTION_PORT: "3306"
      CONNECTION_DATABASE: "munkireport"
      CONNECTION_USERNAME: "munkireport"
      CONNECTION_PASSWORD: "CHANGE_ME_DB_PASSWORD"
      CONNECTION_CHARSET: "utf8mb4"
      CONNECTION_COLLATION: "utf8mb4_unicode_ci"

      AUTH_METHODS: "LOCAL"
      ROLES_ADMIN: "admin"
      ALLOW_MIGRATIONS: "TRUE"

      MODULES: >-
        disk_report,managedinstalls,munkireport,munkireportinfo,
        applications,inventory,network,security,filevault_status,
        softwareupdate,displays_info,installhistory,user_sessions,
        mdm_status,power,wifi

    volumes:
      - munkireport-users:/var/munkireport/local/users
      - munkireport-data:/var/munkireport/local
    networks:
      - munkireport-net

volumes:
  munkireport-db:
  munkireport-users:
  munkireport-data:

networks:
  munkireport-net:
    driver: bridge
