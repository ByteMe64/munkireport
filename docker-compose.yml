# =============================================================================
# MunkiReport Docker Compose - Portainer Ready
# =============================================================================
#
# Stack:
#   munkireport-init  — writes admin user YAML into a named volume
#   db                — MariaDB (version from .env)
#   munkireport       — MunkiReport (version from .env), built from Dockerfile
#                       Ubuntu 24.04 LTS + PHP (version from .env) + Apache 2.4
#
# UPGRADING ANY COMPONENT:
#   1. Update the relevant *_VERSION variable in .env
#   2. In Portainer: Stacks → your stack → Update Stack (with "Re-pull image"
#      checked for db/busybox, and "Rebuild image" checked for munkireport)
#
# BEFORE FIRST DEPLOY:
#   1. Copy .env.example to .env and fill in all CHANGE_ME values
#   2. Set WEBHOST to your real public URL
#   3. Generate a new ADMIN_PASSWORD_HASH (see .env for instructions)
#   4. In Portainer: paste .env contents into the Stack environment variables UI
#
# =============================================================================

services:

  # ---------------------------------------------------------------------------
  # Init container — writes admin.yml into the named volume.
  # Credentials come from environment variables, not hardcoded values.
  # ---------------------------------------------------------------------------
  munkireport-init:
    image: busybox:${BUSYBOX_VERSION:-1.37}
    container_name: munkireport-init
    restart: "no"
    volumes:
      - munkireport-users:/users
    environment:
      ADMIN_EMAIL: "${ADMIN_EMAIL}"
      ADMIN_REALNAME: "${ADMIN_REALNAME}"
      ADMIN_PASSWORD_HASH: "${ADMIN_PASSWORD_HASH}"
    command:
      - sh
      - -c
      - |
        mkdir -p /users
        printf 'username: admin\n'                              > /users/admin.yml
        printf 'realname: %s\n' "$ADMIN_REALNAME"             >> /users/admin.yml
        printf "password_hash: '%s'\n" "$ADMIN_PASSWORD_HASH" >> /users/admin.yml
        printf 'email: %s\n' "$ADMIN_EMAIL"                   >> /users/admin.yml
        echo "--- admin.yml written ---"
        cat /users/admin.yml

  # ---------------------------------------------------------------------------
  # MariaDB — version pinned via MARIADB_VERSION in .env
  # ---------------------------------------------------------------------------
  db:
    image: mariadb:${MARIADB_VERSION:-11.4}
    container_name: munkireport-db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: "${MYSQL_ROOT_PASSWORD}"
      MYSQL_DATABASE: "${MYSQL_DATABASE:-munkireport}"
      MYSQL_USER: "${MYSQL_USER:-munkireport}"
      MYSQL_PASSWORD: "${MYSQL_PASSWORD}"
    # Enforce character set at the server level to match application settings
    command: >
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_unicode_ci
    volumes:
      - munkireport-db:/var/lib/mysql
    networks:
      - munkireport-net
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1.0"
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ---------------------------------------------------------------------------
  # MunkiReport — built from Dockerfile using versions from .env
  # PHP_VERSION and MUNKIREPORT_VERSION are passed as build ARGs so the
  # Dockerfile never needs to be edited for routine version upgrades.
  # ---------------------------------------------------------------------------
  munkireport:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        PHP_VERSION: "${PHP_VERSION:-8.3}"
        MUNKIREPORT_VERSION: "${MUNKIREPORT_VERSION:-5.8.0}"
    container_name: munkireport
    restart: unless-stopped
    depends_on:
      munkireport-init:
        condition: service_completed_successfully
      db:
        condition: service_healthy
    # HOST_PORT in .env should be 127.0.0.1:8080 when sitting behind a reverse
    # proxy, or 0.0.0.0:8080 only if directly internet-facing (not recommended).
    ports:
      - "${HOST_PORT:-127.0.0.1:8080}:80"
    environment:
      SITENAME: "${SITENAME:-MunkiReport}"
      WEBHOST: "${WEBHOST}"

      CONNECTION_DRIVER: "mysql"
      CONNECTION_HOST: "db"
      CONNECTION_PORT: "3306"
      CONNECTION_DATABASE: "${MYSQL_DATABASE:-munkireport}"
      CONNECTION_USERNAME: "${MYSQL_USER:-munkireport}"
      # Single source of truth — both MYSQL_PASSWORD and CONNECTION_PASSWORD
      # resolve to the same .env variable, preventing drift.
      CONNECTION_PASSWORD: "${MYSQL_PASSWORD}"
      CONNECTION_CHARSET: "utf8mb4"
      CONNECTION_COLLATION: "utf8mb4_unicode_ci"

      AUTH_METHODS: "LOCAL"
      ROLES_ADMIN: "admin"
      # Set to FALSE after the initial deployment to prevent automatic schema
      # changes on container restart. Re-enable deliberately for upgrades.
      ALLOW_MIGRATIONS: "${ALLOW_MIGRATIONS:-TRUE}"

      MODULES: "${MUNKIREPORT_MODULES}"

    volumes:
      - munkireport-users:/var/munkireport/local/users
      - munkireport-data:/var/munkireport/local
    networks:
      - munkireport-net
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1.0"

# =============================================================================
# Volumes — all Docker-managed, nothing required on the host filesystem
# =============================================================================
volumes:
  munkireport-db:
  munkireport-users:
  munkireport-data:

# =============================================================================
# Networks
# =============================================================================
networks:
  munkireport-net:
    driver: bridge
